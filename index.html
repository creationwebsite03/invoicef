  <!-- ULTRA FAST SYNC: Restore title and apply cookies before anything else -->
  <script type="text/javascript">
    (function () {
      try {
        var lastTitle = localStorage.getItem('last_seo_title');
        if (lastTitle) {
          document.title = lastTitle;
        }

        var savedLang = localStorage.getItem('lang');
        if (savedLang && savedLang !== 'en') {
          // Hide building DOM for a split second only when translating to prevent the 'English' flash
          document.documentElement.style.visibility = 'hidden';
          setTimeout(function () { document.documentElement.style.visibility = 'visible'; }, 200);

          var val = '/en/' + savedLang;
          var dn = window.location.hostname;
          document.cookie = 'googtrans=' + val + '; path=/';
          document.cookie = 'googtrans=' + val + '; domain=' + dn + '; path=/';
        }
      } catch (e) { }
    })();

  </script>
